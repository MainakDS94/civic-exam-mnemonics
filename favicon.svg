<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1C1A17"/>

  <!-- Ear left – fluffy puff -->
  <ellipse cx="14" cy="30" rx="11" ry="13" fill="#F5F0E8"/>
  <ellipse cx="12" cy="27" rx="7" ry="8" fill="#FFF"/>
  <ellipse cx="16" cy="33" rx="6" ry="7" fill="#EDE8DE"/>

  <!-- Ear right – fluffy puff -->
  <ellipse cx="50" cy="30" rx="11" ry="13" fill="#F5F0E8"/>
  <ellipse cx="52" cy="27" rx="7" ry="8" fill="#FFF"/>
  <ellipse cx="48" cy="33" rx="6" ry="7" fill="#EDE8DE"/>

  <!-- Top-head floof -->
  <ellipse cx="32" cy="17" rx="16" ry="12" fill="#FFF"/>
  <ellipse cx="22" cy="14" rx="9"  ry="8"  fill="#F5F0E8"/>
  <ellipse cx="42" cy="14" rx="9"  ry="8"  fill="#F5F0E8"/>
  <ellipse cx="32" cy="12" rx="11" ry="7"  fill="#FFF"/>

  <!-- Main face -->
  <ellipse cx="32" cy="36" rx="18" ry="17" fill="#FFF"/>

  <!-- Face texture – subtle floof circles -->
  <ellipse cx="20" cy="32" rx="6" ry="5" fill="#F7F3EC" opacity="0.7"/>
  <ellipse cx="44" cy="32" rx="6" ry="5" fill="#F7F3EC" opacity="0.7"/>
  <ellipse cx="32" cy="44" rx="8" ry="5" fill="#F0EBE0" opacity="0.6"/>

  <!-- Eyes -->
  <circle cx="25" cy="33" r="4" fill="#1C1A17"/>
  <circle cx="39" cy="33" r="4" fill="#1C1A17"/>
  <!-- Eye shine -->
  <circle cx="26.5" cy="31.5" r="1.2" fill="#fff"/>
  <circle cx="40.5" cy="31.5" r="1.2" fill="#fff"/>

  <!-- Nose -->
  <ellipse cx="32" cy="40" rx="3.5" ry="2.5" fill="#2C2A28"/>
  <!-- Nose shine -->
  <circle cx="31" cy="39.2" r="0.9" fill="rgba(255,255,255,0.4)"/>

  <!-- Mouth -->
  <path d="M29 43 Q32 46 35 43" fill="none" stroke="#2C2A28" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="21" cy="40" rx="4" ry="2.5" fill="#F5C0C0" opacity="0.35"/>
  <ellipse cx="43" cy="40" rx="4" ry="2.5" fill="#F5C0C0" opacity="0.35"/>

</svg>
